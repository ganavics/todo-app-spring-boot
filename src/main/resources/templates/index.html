<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>To-Do App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f7fa;
        }
        .card{
            margin-top:50px;
            border-radius:15px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">
            📝 My To-Do List
        </h2>

        <form th:action="@{/save}" th:object="${task}" method="post" class="d-flex mb-4">

            <input type="hidden" th:field="*{id}">

            <input
               type="text"
               th:field="*{title}"
               class="form-control me-2"
               placeholder="Enter a task"
               required>

            <button class="btn btn-primary">
                Add Task
            </button>

        </form>

        <ul class="list-group">

            <li
                class="list-group-item d-flex justify-content-between align-items-center"
                th:each="task : ${tasks}">

                <span th:if="${task.completed}" style="text-decoration: line-through; color:green;">
    <span th:text="${task.title}"></span>
</span>

<span th:unless="${task.completed}" th:text="${task.title}"></span>

                <div>
    <a th:href="@{/complete/{id}(id=${task.id})}"
       class="btn btn-success btn-sm me-2">
        Complete
    </a>
    <a th:href="@{/edit/{id}(id=${task.id})}"
       class="btn btn-warning btn-sm me-2">
        Edit
    </a>

    <a th:href="@{/delete/{id}(id=${task.id})}"
       class="btn btn-danger btn-sm">
        Delete
    </a>
                 </div>

            </li>

        </ul>

    </div>

</div>

</body>
</html>
